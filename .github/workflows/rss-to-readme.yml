name: RSS to README

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_committer_name: GitHub Action Bot
          git_committer_email: johan@romantech.net
          trust_level: 5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update README
        id: update_readme
        run: pnpm rss-to-readme

      - name: Commit and push if README changed
        run: |
          if ! git diff --quiet -- README.md; then
            git add README.md
            git commit -S \
              -m "Update README with ${{ steps.update_readme.outputs.added_count }} new article(s) [auto-generated]" \
              -m "Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          Newly added posts:
          ${{ steps.update_readme.outputs.added_links }}"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No README changes to commit"
          fi
